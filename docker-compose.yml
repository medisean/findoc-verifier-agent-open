services:
  app:
    build:
      context: .
      args:
        INSTALL_MINERU: ${INSTALL_MINERU:-true}
    image: findoc-verifier-agent:prod
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PORT: 8000
      ARTIFACT_ROOT: /data/runs
      TASK_STORE_PATH: /data/runs/tasks.sqlite3
      MINERU_MAX_CONCURRENCY: ${MINERU_MAX_CONCURRENCY:-1}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./runs:/data/runs
      - ./examples:/app/examples:ro
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
