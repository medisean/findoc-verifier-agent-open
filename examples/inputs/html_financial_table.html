<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>HTML Financial Table Fixture</title>
  </head>
  <body>
    <h1>季度经营摘要</h1>
    <p>单位：人民币百万元</p>
    <table>
      <caption>主要财务指标</caption>
      <thead>
        <tr>
          <th rowspan="2">项目</th>
          <th colspan="2">报告期</th>
        </tr>
        <tr>
          <th>2025 Q2</th>
          <th>2024 Q2</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>营业收入</td>
          <td>1,250</td>
          <td>1,080</td>
        </tr>
        <tr>
          <td>经营利润</td>
          <td>（215）</td>
          <td>180</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
